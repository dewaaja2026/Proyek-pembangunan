<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Keuangan Bangunan</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2F75B5">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #eef2f3; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #2F75B5; font-size: 1.2rem; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #2F75B5; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-pdf { background: #28a745; margin-top: 10px; }
        .btn-clear { background: #dc3545; margin-top: 10px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .total-box { font-weight: bold; padding: 15px; background: #fff3cd; border-radius: 8px; margin-top: 10px; text-align: right; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="card">
    <h2>Nota Pembangunan</h2>
    <input type="date" id="tanggal">
    <input type="text" id="kategori" placeholder="Kategori (Contoh: Semen)">
    <input type="text" id="jumlah" placeholder="Jumlah (Contoh: 50.000)" oninput="formatRibuan(this)">
    <button onclick="tambahData()">Tambah Data</button>
    <button class="btn-pdf" onclick="generatePDF()">Download PDF</button>
    <button class="btn-clear" onclick="hapusSemua()">Hapus Semua Data</button>
</div>

<table id="tabelData">
    <thead><tr><th>Tanggal</th><th>Kategori</th><th>Jumlah (Rp)</th></tr></thead>
    <tbody></tbody>
</table>
<div id="totalDisplay" class="total-box">Total: Rp 0</div>

<script>
    let data = JSON.parse(localStorage.getItem('dataKeuangan')) || [];
    let total = 0;

    // Load data saat halaman dibuka
    window.onload = renderTable;

    function formatRibuan(input) {
        let value = input.value.replace(/\D/g, "");
        input.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function renderTable() {
        let tbody = document.querySelector('#tabelData tbody');
        tbody.innerHTML = '';
        total = 0;

        data.forEach(item => {
            tbody.innerHTML += `<tr><td>${item[0]}</td><td>${item[1]}</td><td>${item[2]}</td></tr>`;
            total += parseInt(item[2].replace(/\./g, ""));
        });

        document.getElementById('totalDisplay').innerText = "Total: Rp " + total.toLocaleString('id-ID');
    }

    function tambahData() {
        let tgl = document.getElementById('tanggal').value;
        let kat = document.getElementById('kategori').value;
        let jmlRaw = document.getElementById('jumlah').value;
        
        if(tgl && kat && jmlRaw) {
            data.push([tgl, kat, jmlRaw]);
            localStorage.setItem('dataKeuangan', JSON.stringify(data));
            renderTable();
            
            document.getElementById('kategori').value = '';
            document.getElementById('jumlah').value = '';
        } else {
            alert("Mohon isi semua kolom!");
        }
    }

    function hapusSemua() {
        if(confirm("Yakin ingin menghapus semua data?")) {
            data = [];
            localStorage.removeItem('dataKeuangan');
            renderTable();
        }
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Laporan Pengeluaran Proyek", 10, 10);
        doc.autoTable({ head: [['Tanggal', 'Kategori', 'Jumlah (Rp)']], body: data });
        doc.text("Total Keseluruhan: Rp " + total.toLocaleString('id-ID'), 10, doc.lastAutoTable.finalY + 10);
        doc.save('Laporan_Pengeluaran.pdf');
    }
    // Pendaftaran Service Worker untuk PWA
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker terdaftar!', reg))
            .catch(err => console.log('Gagal daftar Service Worker', err));
    });
}
</script>
</body>
</html>
